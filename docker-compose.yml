services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: short_linker_php
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      - db
    entrypoint: ["/entrypoint.sh"]

  nginx:
    image: nginx:1.27-alpine
    container_name: short_linker_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8.0
    container_name: short_linker_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: short_linker
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "33069:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  db_data: